# .github/workflows/build.yml
# ─────────────────────────────────────────────────────────────────────────────
# Builds InspectX desktop binaries for Windows and macOS, then attaches them
# to a GitHub Release whenever you push a version tag (e.g. v1.0.0).
#
# How to trigger a release:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# The workflow will:
#   1. Build on Windows → InspectX-windows.zip
#   2. Build on macOS   → InspectX-macos.zip
#   3. Create a GitHub Release and attach both ZIPs
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # also lets you run manually from the Actions tab

jobs:
  # ── Windows build ────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Seed demo database
        run: python seed_demo.py

      - name: Build with PyInstaller
        run: pyinstaller inspectx.spec

      - name: Zip bundle
        run: Compress-Archive -Path dist\InspectX\* -DestinationPath InspectX-windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InspectX-windows
          path: InspectX-windows.zip

  # ── macOS build ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Seed demo database
        run: python seed_demo.py

      - name: Build with PyInstaller
        run: pyinstaller inspectx.spec

      - name: Zip bundle
        run: zip -r InspectX-macos.zip dist/InspectX.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InspectX-macos
          path: InspectX-macos.zip

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    # Only run when a tag was pushed (not on manual dispatch without a tag)
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write   # needed to create a release

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: InspectX-windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: InspectX-macos

      - name: Create Release and attach binaries
        uses: softprops/action-gh-release@v2
        with:
          name: "InspectX ${{ github.ref_name }}"
          body: |
            ## InspectX — Defect Detection Studio

            ### Download
            | Platform | File |
            |----------|------|
            | Windows  | `InspectX-windows.zip` |
            | macOS    | `InspectX-macos.zip`   |

            ### Quick Start
            1. Download the ZIP for your OS and extract it
            2. Run **InspectX.exe** (Windows) or **InspectX.app** (macOS)
            3. Log in with the demo credentials:
               - **Email:** `demo@inspectx.ai` **Password:** `demo1234`

            ### What to explore
            - Create a project and upload images
            - Draw bounding-box annotations
            - Manage dataset versions and trained models
            - Review metrics on the Overview dashboard

            > No Python installation required — everything is bundled.
          files: |
            InspectX-windows.zip
            InspectX-macos.zip
          draft: false
          prerelease: false
